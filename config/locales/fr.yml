    problem:
      title: "Pourquoi tant de diplômés peinent-ils à s'en sortir professionnellement ?"
      description:
        - "Tu as un diplôme. Tu as des compétences. Mais tu n’as pas une stratégie de positionnement claire."
        - "De récentes études menées par l'Organisation Internationale du Travail montrent qu'en Afrique subsaharienne, 1 jeune sur 3 est soit au chômage, soit sous-employé, même avec un diplôme."
        - "Mais cela n’est pas suffisant pour te garantir un avenir professionnel s’il te manque une stratégie de positionnement claire."
      subtitle: "Résultats :"
      items:
        - "Difficulté à identifier des débouchés précis"
        - "CV peu différenciant"
        - "Candidatures sans retour"
        - "Impression de stagnation"
      quote: "Le marché rémunère la valeur perçue et la clarté du positionnement."
